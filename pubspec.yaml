name: datasphere
description: A campus facility management mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  flutter_sound: ^9.2.13
  audioplayers: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.2.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
